[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["domain", "use_cases"]

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.ruff]
line-length = 99
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N"]

[tool.ruff.lint.isort]
known-first-party = ["domain", "use_cases", "infra", "app"]
