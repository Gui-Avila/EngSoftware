<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinTrack{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('frontend.index') }}" class="navbar-brand">FinTrack</a>
        <div class="navbar-links">
            <a href="{{ url_for('frontend.index') }}" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('frontend.categorias') }}" class="{% if active == 'categorias' %}active{% endif %}">Categorias</a>
            <a href="{{ url_for('frontend.transacoes') }}" class="{% if active == 'transacoes' %}active{% endif %}">Transações</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>FinTrack &mdash; Engenharia de Software, PUC-Rio</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
